name: autoupdate

on:
  schedule:
    - cron: '0 20 14,28 * *'
  workflow_dispatch:

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.COATL_BOT_GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'

      - name: Upgrade uvx requirements
        run: |
          python -m pip install --dry-run --no-deps --report "$RUNNER_TEMP/uvx.json" --requirement uvx.in
          jq -r '.install[].metadata | "\(.name)==\(.version)"' "$RUNNER_TEMP/uvx.json" > uvx.txt
        working-directory: requirements

      - name: Detect changes
        id: git-diff
        uses: coatl-dev/actions/simple-git-diff@f87a5a88c6de25e7d0085d0bbee0ffb7318a9e6c # v7.0.6

      - name: Import GPG key
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        id: gpg-import
        uses: coatl-dev/actions/gpg-import@f87a5a88c6de25e7d0085d0bbee0ffb7318a9e6c # v7.0.6
        with:
          passphrase: ${{ secrets.COATL_BOT_GPG_PASSPHRASE }}
          private-key: ${{ secrets.COATL_BOT_GPG_PRIVATE_KEY }}

      - name: Commit and push changes
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        run: |
          git checkout -B autoupdate
          git add -u
          git commit -m "build(deps): update build dependencies"
          git push --force --set-upstream origin autoupdate

      - name: Create pull request
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        uses: coatl-dev/actions/pr-create@05b877c5c64fc3ddb9e87f47400311ebf64fe9d5 # v7.0.9
        with:
          gh-token: ${{ secrets.COATL_BOT_GH_TOKEN }}
